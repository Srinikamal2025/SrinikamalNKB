<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Dashboard</title>
    <style>
        /* A little basic styling to make it look clean */
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f9; }
        .dashboard-container { display: flex; gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex: 1; }
        .form-group { display: flex; flex-direction: column; max-width: 300px; gap: 10px; margin-bottom: 20px;}
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="card">
            <h2>Total Revenue</h2>
            <h3 style="color: green;">₹<span id="revenue-counter">0</span></h3>
        </div>
        <div class="card">
            <h2>Cash Collected</h2>
            <h3 style="color: blue;">₹<span id="balance-counter">0</span></h3>
        </div>
    </div>

    <div class="card" style="max-width: 400px;">
        <h3>Check In a Guest</h3>
        <form id="checkInForm" class="form-group">
            <input type="text" id="roomNum" placeholder="Room Number (e.g., 101)" required>
            <input type="text" id="guestName" placeholder="Guest Name" required>
            <input type="text" id="aadharNum" placeholder="Aadhar / ID Number">
            <input type="text" id="phoneNum" placeholder="Phone Number">
            <label for="checkInDate" style="font-size: 12px; color: gray;">Check-in Date:</label>
            <input type="date" id="checkInDate" required>
            <input type="number" id="roomPrice" placeholder="Total Room Price" required>
            <input type="number" id="amountPaid" placeholder="Amount Paid Upfront" required>
            
            <button type="button" onclick="submitForm()">Book Room</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
